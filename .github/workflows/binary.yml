name: Build Binary and Release

on:
  push:
    tags:
      - "[vV]?[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          allow-missing-changelog: true
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true

  build-and-upload:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: "${{ matrix.target }}"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"
      - uses: taiki-e/install-action@nextest
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Check
        run: cargo check --release --target ${{ matrix.target }}
      - name: Test
        run: cargo nextest run --release --target ${{ matrix.target }}
      - name: Doc tests
        run: cargo test --doc --release --target ${{ matrix.target }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: cargo-uv
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#[vV]}"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            gh release edit "$tag" --draft=false --prerelease
          else
            gh release edit "$tag" --draft=false --no-prerelease
          fi
